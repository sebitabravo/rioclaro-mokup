services:
  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: rioclaro_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rioclaro_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rioclaro}
      MYSQL_USER: ${MYSQL_USER:-rioclaro_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rioclaro_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - rioclaro_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis para cache y sesiones
  redis:
    image: redis:7-alpine
    container_name: rioclaro_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - rioclaro_network

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: rioclaro_backend
    restart: unless-stopped
    environment:
      - DJANGO_ENVIRONMENT=${DJANGO_ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${MYSQL_DATABASE:-rioclaro}
      - DB_USER=${MYSQL_USER:-rioclaro_user}
      - DB_PASSWORD=${MYSQL_PASSWORD:-rioclaro_pass}
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rioclaro_network
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: rioclaro_celery
    restart: unless-stopped
    environment:
      - DJANGO_ENVIRONMENT=${DJANGO_ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${MYSQL_DATABASE:-rioclaro}
      - DB_USER=${MYSQL_USER:-rioclaro_user}
      - DB_PASSWORD=${MYSQL_PASSWORD:-rioclaro_pass}
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    networks:
      - rioclaro_network
    command: celery -A rioclaro_api worker --loglevel=info

  # Celery Beat (tareas programadas)
  celery-beat:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: rioclaro_celery_beat
    restart: unless-stopped
    environment:
      - DJANGO_ENVIRONMENT=${DJANGO_ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${MYSQL_DATABASE:-rioclaro}
      - DB_USER=${MYSQL_USER:-rioclaro_user}
      - DB_PASSWORD=${MYSQL_PASSWORD:-rioclaro_pass}
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    networks:
      - rioclaro_network
    command: celery -A rioclaro_api beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # Frontend React/Vite
  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    container_name: rioclaro_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_DATA_SOURCE=${VITE_DATA_SOURCE:-API}
      - NODE_ENV=${NODE_ENV:-development}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - rioclaro_network
    command: npm run dev -- --host 0.0.0.0

  # Nginx (solo para producción)
  nginx:
    image: nginx:alpine
    container_name: rioclaro_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - static_files:/var/www/static
      - media_files:/var/www/media
      - ./ssl:/etc/ssl/certs
    depends_on:
      - backend
      - frontend
    networks:
      - rioclaro_network
    profiles:
      - production

volumes:
  mysql_data:
  redis_data:
  static_files:
  media_files:

networks:
  rioclaro_network:
    driver: bridge